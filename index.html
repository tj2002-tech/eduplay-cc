<script>
// ==================== VOCAB DATA ====================

};

// ==================== LEVEL SYSTEM ====================
const LEVELS=[
  {lv:1, xp:0,     title:'单词新手', icon:'🌱'},
  {lv:2, xp:100,   title:'单词新手', icon:'🌱'},
  {lv:3, xp:250,   title:'单词新手', icon:'🌱'},

  {lv:19,xp:11700, title:'词汇传说', icon:'👑'},
  {lv:20,xp:13200, title:'词汇传说', icon:'👑'},
];

function getLevelInfo(xp){
  let cur=LEVELS[0];
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];break}}
  const nextIdx=LEVELS.findIndex(l=>l.lv===cur.lv);
  const next=LEVELS[nextIdx+1]||null;
  const pct=next?Math.round(((xp-cur.xp)/(next.xp-cur.xp))*100):100;
  return{lv:cur.lv,title:cur.title,icon:cur.icon,pct,cur,next,xp};
}

function renderXPBar(){
  const info=getLevelInfo(userData.xp||0);
  document.getElementById('xpLvl').textContent='Lv.'+info.lv;
  document.getElementById('xpFill').style.width=info.pct+'%';
  document.getElementById('xpTitle').textContent=info.title;
}

function gainXP(amount,label,x,y){
  userData.xp=(userData.xp||0)+amount;
  const prevLv=getLevelInfo(userData.xp-amount).lv;
  saveData();
  renderXPBar();
  // XP float toast
  if(x!=null){
    const d=document.createElement('div');
    d.className='xp-gain-toast';
    d.textContent='+'+amount+' XP';
    d.style.cssText=`left:${x}px;top:${y-30}px`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1200);
  }
  // Check level up
  const newLv=getLevelInfo(userData.xp).lv;
  if(newLv>prevLv){
    userData.level=newLv;
    saveData();
    setTimeout(()=>showLevelUp(getLevelInfo(userData.xp)),400);
  }
}

function showLevelUp(info){
  const ov=document.createElement('div');
  ov.className='lvlup-overlay';
  ov.innerHTML=`<div class="lvlup-card">
    <div class="lv-icon">${info.icon}</div>
    <h2>升级啦！Lv.${info.lv}</h2>
    <div class="lv-sub">继续努力，词汇量与日俱增！</div>
    <div class="lv-title">${info.title}</div>
    <button id="lvlupClose">太棒了！</button>
  </div>`;
  document.body.appendChild(ov);
  burst(innerWidth/2,innerHeight/2,60);
  document.getElementById('lvlupClose').onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
}

// ==================== STORAGE ====================
const STORE_KEY='eduplay_data';
function defaultData(){
  return{totalGames:0,totalScore:0,bestScore:0,maxCombo:0,totalPairs:0,
    dailyStreak:0,lastPlayDate:'',checkinDates:[],
    achievements:[],wrongWords:{},customVocabs:{},
    todayPlayed:false,xp:0,level:1,
    leaderboard:{scores:[],combos:[],pairs:[],streaks:[]}}
}
function loadData(){
  try{const d=localStorage.getItem(STORE_KEY);if(!d)return defaultData();
    const loaded={...defaultData(),...JSON.parse(d)};
    if(!loaded.leaderboard)loaded.leaderboard={scores:[],combos:[],pairs:[],streaks:[]};
    return loaded;
  }catch(e){return defaultData()}
}
function saveData(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(userData))}catch(e){}
}

  for(let i=0;i<n;i++){const a=Math.random()*6.28,s=2.5+Math.random()*9;PX.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,r:2+Math.random()*6,l:1,c:cols[~~(Math.random()*cols.length)],shape:Math.random()>0.5?'circle':'star'})}
}
function drawStar(ctx,x,y,r){ctx.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;const px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.fill()}
function drawPX(){
  cx.clearRect(0,0,cv.width,cv.height);
  PX=PX.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.32;p.vx*=0.99;p.l-=0.02;p.r*=0.975;cx.globalAlpha=Math.max(0,p.l);cx.fillStyle=p.c;
    if(p.shape==='star')drawStar(cx,p.x,p.y,p.r);else{cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.28);cx.fill()}return p.l>0});
  cx.globalAlpha=1;requestAnimationFrame(drawPX)
}drawPX();

// ==================== DAILY STREAK ====================
function updateStreak(){
  const today=todayStr();
  if(userData.lastPlayDate){
    const last=new Date(userData.lastPlayDate);
    const diff=Math.floor((new Date(today)-last)/(86400000));
    if(diff>1)userData.dailyStreak=0;
  }
  userData.todayPlayed=userData.lastPlayDate===today;
}

function doCheckin(){
  const today=todayStr();
  if(userData.lastPlayDate===today)return;
  const last=userData.lastPlayDate?new Date(userData.lastPlayDate):null;
  const diff=last?Math.floor((new Date(today)-last)/86400000):999;
  if(diff===1)userData.dailyStreak++;
  else if(diff>1)userData.dailyStreak=1;
  else userData.dailyStreak=1;
  userData.lastPlayDate=today;
  userData.todayPlayed=true;
  if(!userData.checkinDates)userData.checkinDates=[];
  if(!userData.checkinDates.includes(today))userData.checkinDates.push(today);
  if(userData.checkinDates.length>90)userData.checkinDates=userData.checkinDates.slice(-90);
  saveData();
  renderStreak();
  checkStreakAchievements();
  gainXP(30,'打卡',innerWidth/2,80);
}

function renderStreak(){
  updateStreak();
  document.getElementById('streakText').textContent='连续打卡 '+userData.dailyStreak+' 天';
  document.getElementById('streakSub').textContent=userData.todayPlayed?'✅ 今日已打卡':'完成一局即可打卡';
  const cal=document.getElementById('streakCal');
  cal.innerHTML='';
  const week=getWeekDays();
  const dayNames=['一','二','三','四','五','六','日'];
  const today=todayStr();
  week.forEach((d,i)=>{
    const dot=document.createElement('div');
    dot.className='streak-dot';
    if(userData.checkinDates&&userData.checkinDates.includes(d))dot.classList.add('done');
    if(d===today)dot.classList.add('today');
    dot.textContent=dayNames[i];
    cal.appendChild(dot);
  });
}

function addToLeaderboard(entry){
  if(!userData.leaderboard)userData.leaderboard={scores:[],combos:[],pairs:[],streaks:[]};
  const lb=userData.leaderboard;
  lb.scores.push({v:entry.score,date:todayStr()});
  lb.combos.push({v:entry.combo,date:todayStr()});
  lb.pairs.push({v:entry.pairs,date:todayStr()});
  // streaks already tracked via dailyStreak
  // sort descending, keep top 10
  ['scores','combos','pairs'].forEach(k=>{
    lb[k].sort((a,b)=>b.v-a.v);
    if(lb[k].length>10)lb[k]=lb[k].slice(0,10);
  });
  // streak history
  lb.streaks.push({v:userData.dailyStreak,date:todayStr()});
  lb.streaks.sort((a,b)=>b.v-a.v);
  if(lb.streaks.length>10)lb.streaks=lb.streaks.slice(0,10);
  saveData();
}

function generateShareCard(data){
  const W=400,H=520;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');

  // Background gradient
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#8B5CF6');grad.addColorStop(0.5,'#4A9EF5');grad.addColorStop(1,'#14B8A6');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Decorative circles
  ctx.globalAlpha=0.12;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(340,60,120,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(50,440,90,0,6.28);ctx.fill();
  ctx.globalAlpha=1;

  // Card body
  ctx.fillStyle='rgba(255,255,255,0.95)';
  roundRect(ctx,24,90,W-48,H-120,20);
  ctx.fill();

  // Logo
  ctx.font='bold 28px Fredoka One, sans-serif';
  ctx.fillStyle='#E85D8C';
  ctx.textAlign='center';
  ctx.fillText('EduPlay',W/2,48);
  ctx.font='bold 14px Nunito, sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('单词消消乐',W/2,70);

  const info=getLevelInfo(data.xp);
  // Level badge
  ctx.fillStyle='#8B5CF6';
  roundRect(ctx,W/2-55,102,110,30,15);ctx.fill();
  ctx.font='bold 14px Nunito, sans-serif';
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.fillText(`${info.icon} Lv.${info.lv} ${info.title}`,W/2,122);

  // Score
  ctx.fillStyle='#3D3D4E';
  ctx.font='bold 18px Nunito, sans-serif';
  ctx.fillText('本局得分',W/2,165);
  ctx.font='bold 72px Fredoka One, sans-serif';
  ctx.fillStyle='#4A9EF5';
  ctx.fillText(data.score,W/2,240);

  // Stars
  ctx.font='28px serif';
  ctx.fillText(data.stars,W/2,275);

  // Stats chips
  const chips=[
    ['🔥 最高连击',`×${data.combo}`],
    ['🎯 正确率',`${data.acc}%`],
    ['📊 累计消除',`${data.totalPairs}对`],
    ['📅 打卡天数',`${data.streak}天`],
  ];
  const chipW=156,chipH=60,chipGap=10;
  const startX=24+12,startY=292;
  chips.forEach(([label,val],i)=>{
    const col=i%2,row=Math.floor(i/2);
    const x=startX+col*(chipW+chipGap),y=startY+row*(chipH+chipGap);
    ctx.fillStyle='#F7F0FF';
    roundRect(ctx,x,y,chipW,chipH,12);ctx.fill();
    ctx.fillStyle='#A0A0B8';
    ctx.font='bold 11px Nunito, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(label,x+chipW/2,y+20);
    ctx.fillStyle='#8B5CF6';
    ctx.font='bold 20px Fredoka One, sans-serif';
    ctx.fillText(val,x+chipW/2,y+44);
  });

  // Footer
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 12px Nunito, sans-serif';
  ctx.fillText('来 PK 我！→ eduplay.cc',W/2,H-16);

  return c;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function showCustomVocabEditor(editKey){
  const existing=editKey?userData.customVocabs[editKey]:null;
  const ov=document.createElement('div');
  ov.className='cv-overlay';
  ov.innerHTML=`<div class="cv-modal">
    <h3>${existing?'✏️ 编辑词组':'＋ 创建自定义词组'}</h3>
    <div class="cv-sub">输入英中单词对，每行一对，用空格或Tab分隔</div>
    <label>词组名称</label>
    <input type="text" id="cvName" placeholder="例如：Unit 3 单词" value="${existing?editKey:''}">
    <label>单词对（每行一对）</label>
    <textarea id="cvText" placeholder="apple 苹果&#10;book 书本&#10;cat 猫">${existing?existing.map(p=>p[0]+' '+p[1]).join('\n'):''}</textarea>
    <div class="cv-hint">支持空格或Tab分隔，也可从Excel直接粘贴。上限50对。</div>
    <div class="cv-error" id="cvError"></div>
    <div class="cv-btns">
      <button class="cv-cancel" id="cvCancel">取消</button>
      <button class="cv-save" id="cvSave">保存</button>
    </div>
    <div class="cv-saved" id="cvSaved"></div>
  </div>`;
  document.body.appendChild(ov);
  renderSavedVocabs();
  document.getElementById('cvCancel').onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  document.getElementById('cvSave').onclick=()=>{
    const name=document.getElementById('cvName').value.trim();
    const text=document.getElementById('cvText').value.trim();
    const errEl=document.getElementById('cvError');
    errEl.style.display='none';
    if(!name){errEl.textContent='请输入词组名称';errEl.style.display='block';return}
    if(!text){errEl.textContent='请输入至少一对单词';errEl.style.display='block';return}
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
    const pairs=[];const errors=[];const seen=new Set();
    lines.forEach((line,i)=>{
      const parts=line.split(/[\t ]+/);
      if(parts.length<2){errors.push(`第 ${i+1} 行格式错误：「${line}」`);return}
      const en=parts[0].trim(),zh=parts.slice(1).join(' ').trim();
      if(!en||!zh){errors.push(`第 ${i+1} 行内容不完整`);return}
      if(seen.has(en.toLowerCase())){return}
      seen.add(en.toLowerCase());
      pairs.push([en,zh]);
    });
    if(errors.length>0){errEl.innerHTML=errors.slice(0,3).join('<br>');errEl.style.display='block';return}
    if(pairs.length===0){errEl.textContent='没有解析到有效的单词对';errEl.style.display='block';return}
    if(pairs.length>50){errEl.textContent='单词对数量超过上限（50对），已截取前50对';pairs.length=50;errEl.style.display='block'}
    if(existing&&editKey!==name)delete userData.customVocabs[editKey];
    userData.customVocabs[name]=pairs;
    saveData();renderGradeButtons();renderSavedVocabs();checkCustomVocabAchievements();
    document.getElementById('cvName').value='';document.getElementById('cvText').value='';
    errEl.style.display='none';
    const saveBtn=document.getElementById('cvSave');
    saveBtn.textContent='✓ 已保存';setTimeout(()=>saveBtn.textContent='保存',1500);
  };
}

function renderSavedVocabs(){
  const container=document.getElementById('cvSaved');
  if(!container)return;

// ==================== GRADE BUTTONS ====================
function renderGradeButtons(){
  const container=document.getElementById('gradeContainer');
  const existing=container.querySelectorAll('.gbtn.custom[data-book]');
  existing.forEach(b=>b.remove());
  const addBtn=document.getElementById('addVocabBtn');
  Object.keys(userData.customVocabs).forEach(k=>{
    const btn=document.createElement('button');
    btn.className='gbtn custom';
    btn.dataset.book='custom:'+k;
    btn.textContent=k;
    container.insertBefore(btn,addBtn);
    btn.onclick=()=>{
      container.querySelectorAll('.gbtn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');G.book='custom:'+k;
    };
  });
}

document.querySelectorAll('.gbtn[data-book]').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.gbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');G.book=b.dataset.book;
  };
});

document.getElementById('addVocabBtn').onclick=()=>showCustomVocabEditor();
document.getElementById('wrongWordBtn').onclick=()=>{showWrongWordBook()};

// ==================== LAYOUT ====================
function calcLayout(count){
  const maxW=document.getElementById('grid').offsetWidth||640;
  const gap=10;const options=[3,4,5,6];
  let bestCols=4,bestRem=999;
  for(const c of options){const rem=count%c;if(rem<bestRem){bestRem=rem;bestCols=c}}
  const sz=Math.max(72,Math.min(130,Math.floor((maxW-gap*(bestCols-1))/bestCols)));
  return{cols:bestCols,sz}
}

function fitTextToCircle(span,bubbleSz,isZh){
  const maxW=bubbleSz*0.74;
  let fs=Math.round(bubbleSz*(isZh?0.34:0.28));
  const fontFamily=isZh?"'Ma Shan Zheng',sans-serif":"'Fredoka',cursive";
  const fontWeight=isZh?'700':'600';
  measureCanvas.font=`${fontWeight} ${fs}px ${fontFamily}`;
  let tw=measureCanvas.measureText(span.textContent).width;
  while(tw>maxW&&fs>10){fs--;measureCanvas.font=`${fontWeight} ${fs}px ${fontFamily}`;tw=measureCanvas.measureText(span.textContent).width}
  span.style.fontSize=fs+'px';span.style.whiteSpace='nowrap';
}

function renderProgress(){
  const wrap=document.getElementById('progress');wrap.innerHTML='';
  for(let i=0;i<G.total;i++){const dot=document.createElement('div');dot.className='pdot'+(i<G.matched?' done':'');wrap.appendChild(dot)}
}

// ==================== GET VOCAB ====================
function getVocab(){
  if(G.book==='wrongwords'){
    return Object.entries(userData.wrongWords||{}).map(([en,{zh}])=>[en,zh]);
  }
  if(G.book.startsWith('custom:')){
    const key=G.book.slice(7);
    return userData.customVocabs[key]||[];
  }
  return VOCAB[G.book]||VOCAB.pep3;
}

// ==================== START GAME ====================
function startGame(){
  clearInterval(G.iv);
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  G.isReviewMode=G.book==='wrongwords';
  G.reviewMatches={};
  Object.assign(G,{score:0,combo:1,maxCombo:1,matched:0,errors:0,selEn:null,selZh:null,running:true,matchedPairs:[],startTime:Date.now()});

  const n=parseInt(document.getElementById('pairSel').value);
  const ts=document.getElementById('timeSel').value;
  G.tMax=parseInt(ts)||9999;G.timer=G.tMax;

  const allVocab=getVocab();
  if(allVocab.length===0){
    document.getElementById('hint').innerHTML=G.isReviewMode
      ?'<b style="color:#EF4444">错词本是空的！先去玩几局攒错词吧 😊</b>'
      :'<b style="color:#EF4444">该词组为空，请选择其他词库或添加单词</b>';
    G.running=false;return;
  }
  const vocab=shuffle(allVocab).slice(0,Math.min(n,allVocab.length));
  G.total=vocab.length;G.currentVocab=vocab;

  let tiles=shuffle([...vocab.map(p=>({word:p[0],type:'en',pair:p[1]})),...vocab.map(p=>({word:p[1],type:'zh',pair:p[0]}))]);
  const count=tiles.length;const{cols,sz}=calcLayout(count);
  const rem=count%cols;
  if(rem>0)for(let i=0;i<cols-rem;i++)tiles.push({type:'empty'});

  const grid=document.getElementById('grid');grid.innerHTML='';
  tiles.forEach((t,idx)=>{
    const b=document.createElement('div');
    b.className='bubble entering '+(t.type==='empty'?'empty':t.type);
    b.style.width=sz+'px';b.style.height=sz+'px';
    if(t.type!=='empty'){
      b.dataset.word=t.word;b.dataset.type=t.type;b.dataset.pair=t.pair;
      const span=document.createElement('span');span.className='btext';span.textContent=t.word;
      fitTextToCircle(span,sz,t.type==='zh');
      b.appendChild(span);b.onclick=()=>onBubble(b);
    }else{b.style.visibility='hidden'}
    grid.appendChild(b);
    setTimeout(()=>{b.classList.remove('entering');b.classList.add('entered');b.style.transition='transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.18s,opacity 0.35s'},40+idx*35);
  });

  const modeHint=G.isReviewMode?'📝 <b style="color:#EF4444">错词复习模式</b> — 配对成功 3 次自动从错词本移除':
    '点击 <b style="color:var(--blue)">蓝色气泡</b>（英文）→ 再点 <b style="color:var(--pink)">粉色气泡</b>（中文）配对消除 ✨';
  document.getElementById('hint').innerHTML=modeHint;
  renderProgress();updateHUD();updateTimer();
  if(G.tMax<9999){G.iv=setInterval(()=>{if(!G.running)return;G.timer--;updateTimer();if(G.timer<=0)endGame('time')},1000)}
}

// ==================== BUBBLE CLICK ====================
function onBubble(el){
  if(!G.running||el.classList.contains('gone'))return;
  const type=el.dataset.type;
  playTone(type==='en'?520:660,0.12);
  if(type==='en'){
    if(G.selEn)G.selEn.classList.remove('selected');
    if(G.selEn===el){G.selEn=null;return}
    G.selEn=el;el.classList.add('selected');
    if(G.selZh)checkMatch();
  }else{
    if(G.selZh)G.selZh.classList.remove('selected');
    if(G.selZh===el){G.selZh=null;return}
    G.selZh=el;el.classList.add('selected');
    if(G.selEn)checkMatch();
  }
}

// ==================== CHECK MATCH ====================
function checkMatch(){
  const en=G.selEn,zh=G.selZh;
  if(en.dataset.pair===zh.dataset.word){
    speak(en.dataset.word);playTone(880,0.15);setTimeout(()=>playTone(1100,0.15),100);
    const pts=100*G.combo;G.score+=pts;G.matched++;
    G.matchedPairs.push([en.dataset.word,zh.dataset.word]);
    if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    const pc=G.combo++;
    const er=en.getBoundingClientRect(),zr=zh.getBoundingClientRect();
    burst((er.left+er.right)/2,(er.top+er.bottom)/2,28);
    burst((zr.left+zr.right)/2,(zr.top+zr.bottom)/2,28);
    pop('+'+pts,(er.left+er.right)/2,(er.top+er.bottom)/2-10,'#F59E0B');
    if(pc>=2)showCombo(pc);

    // Review mode: track matches per word, remove after 3
    if(G.isReviewMode){
      const enWord=en.dataset.word;
      G.reviewMatches[enWord]=(G.reviewMatches[enWord]||0)+1;
      if(G.reviewMatches[enWord]>=3&&userData.wrongWords[enWord]){
        delete userData.wrongWords[enWord];
        saveData();
        renderWrongWordCount();
        const removeEl=document.createElement('div');
        removeEl.className='pop';removeEl.textContent='✓ 已掌握！';
        removeEl.style.cssText=`left:${(er.left+er.right)/2-40}px;top:${(er.top+er.bottom)/2-40}px;color:#14B8A6;font-size:16px`;
        document.body.appendChild(removeEl);setTimeout(()=>removeEl.remove(),950);
      }
    }

    en.classList.remove('selected');zh.classList.remove('selected');
    en.classList.add('gone');zh.classList.add('gone');
    setTimeout(()=>{en.style.visibility='hidden';zh.style.visibility='hidden'},450);
    G.selEn=null;G.selZh=null;
    const scoreEl=document.getElementById('sScore');scoreEl.classList.add('pop-anim');setTimeout(()=>scoreEl.classList.remove('pop-anim'),250);
    updateHUD();renderProgress();
    if(G.matched===G.total)setTimeout(()=>endGame('win'),500);
  }else{
    G.combo=1;G.errors++;
    playTone(220,0.25);
    const enWord=en.dataset.word;
    if(!userData.wrongWords[enWord])userData.wrongWords[enWord]={zh:en.dataset.pair,count:0};
    userData.wrongWords[enWord].count++;
    saveData();
    renderWrongWordCount();
    en.classList.add('wrong');zh.classList.add('wrong');
    document.getElementById('app').classList.add('screen-shake');
    setTimeout(()=>document.getElementById('app').classList.remove('screen-shake'),300);
    setTimeout(()=>{en.classList.remove('wrong','selected');zh.classList.remove('wrong','selected');G.selEn=null;G.selZh=null},480);
    updateHUD();
  }
}

function updateHUD(){document.getElementById('sScore').textContent=G.score;document.getElementById('sCombo').textContent='×'+G.combo}
function updateTimer(){
  const el=document.getElementById('sTimer'),bar=document.getElementById('tFill');
  if(G.tMax>=9999){el.textContent='∞';bar.style.width='100%';return}
  const pct=Math.max(0,(G.timer/G.tMax)*100);
  el.textContent=G.timer;bar.style.width=pct+'%';bar.className='timer-fill'+(G.timer<=10?' warn':'');
}
function confetti(){for(let i=0;i<80;i++)setTimeout(()=>burst(Math.random()*innerWidth,-10,8),i*20)}

// ==================== END GAME ====================
function endGame(reason){
  clearInterval(G.iv);G.running=false;
  if(reason==='win')confetti();

  userData.totalGames++;
  userData.totalScore+=G.score;
  userData.totalPairs+=G.matched;
  if(G.score>userData.bestScore)userData.bestScore=G.score;
  if(G.maxCombo>userData.maxCombo)userData.maxCombo=G.maxCombo;
  doCheckin();
  saveData();
  checkGameAchievements();

  // XP for game
  let xpEarned=20;
  if(G.matched===G.total&&G.total>0)xpEarned+=50;
  if(G.maxCombo>=3)xpEarned+=10;
  gainXP(xpEarned,null,null,null);

  // Leaderboard
  addToLeaderboard({score:G.score,combo:G.maxCombo,pairs:G.matched});

  const win=reason==='win',acc=G.total>0?Math.round((G.matched/G.total)*100):0;
  const stars=G.matched===G.total?'⭐⭐⭐':G.matched/G.total>=0.6?'⭐⭐☆':'⭐☆☆';
  const lvInfo=getLevelInfo(userData.xp);

  let wordListHTML='';
  if(G.currentVocab.length>0){
    wordListHTML='<div class="word-list-wrap">';
    G.currentVocab.forEach(pair=>{
      const matched=G.matchedPairs.some(m=>m[0]===pair[0]);
      wordListHTML+=`<div class="word-pair"><span class="check">${matched?'✅':'❌'}</span><span class="en-w">${pair[0]}</span><span class="zh-w">${pair[1]}</span></div>`;
    });
    wordListHTML+='</div>';
  }

  const shareData={score:G.score,combo:G.maxCombo,acc,stars,streak:userData.dailyStreak,totalPairs:userData.totalPairs,xp:userData.xp};

  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <div class="em">${win?'🎉':'⏰'}</div>
    <div class="stars">${stars}</div>
    <h2>${win?'全部消除！':'时间到了！'}</h2>
    <p class="sub">${win?'太棒了！所有单词配对成功':'已消除 '+G.matched+' / '+G.total+' 对'}</p>
    <span class="big">${G.score}</span>
    <div class="big-label">总分</div>
    <div class="chips">
      <span class="chip">🔥 最高连击 ×${G.maxCombo}</span>
      <span class="chip">🎯 正确率 ${acc}%</span>
      <span class="chip">📊 累计 ${userData.totalPairs} 对</span>
      <span class="chip">${lvInfo.icon} Lv.${lvInfo.lv} ${lvInfo.title}</span>
    </div>
    <button class="btn-go" onclick="document.querySelector('.overlay').remove();startGame()">🔄 再来一局</button>
    <button class="btn-share" id="shareBtn">📸 生成分享卡片</button>
    <button class="btn-link" id="toggleWordList">查看本局单词 ▾</button>
    <div id="wordListContainer" style="display:none;max-height:200px;overflow-y:auto">${wordListHTML}</div>
  </div>`;
  document.body.appendChild(ov);

  document.getElementById('shareBtn').onclick=()=>showShareCard(shareData);
  document.getElementById('toggleWordList').onclick=()=>{
    const c=document.getElementById('wordListContainer');
    const shown=c.style.display!=='none';
    c.style.display=shown?'none':'block';
    document.getElementById('toggleWordList').textContent=shown?'查看本局单词 ▾':'收起单词 ▴';
  };
}

// ==================== INIT ====================
document.getElementById('startBtn').onclick=startGame;
document.getElementById('sndBtn').onclick=function(){G.snd=!G.snd;this.textContent=G.snd?'🔊':'🔇';this.className='btn-icon'+(G.snd?' on':'')};
document.getElementById('fsBtn').onclick=()=>{!document.fullscreenElement?document.documentElement.requestFullscreen?.():document.exitFullscreen?.()};
document.getElementById('achBtn').onclick=showAchievements;
document.getElementById('lbBtn').onclick=showLeaderboard;
document.getElementById('xpLvl').onclick=()=>{
  const info=getLevelInfo(userData.xp);
  const next=info.next;
  alert(`${info.icon} Lv.${info.lv} ${info.title}\n当前经验：${userData.xp} XP\n${next?`距离 Lv.${next.lv} 还需：${next.xp-userData.xp} XP`:'已达最高等级！'}`);
};

renderStreak();
renderGradeButtons();
renderXPBar();
renderWrongWordCount();
</script>
