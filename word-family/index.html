const COLORS=['#E85D8C','#4A9EF5','#F59E0B','#8B5CF6','#14B8A6','#EF4444','#10B981','#F97316'];
const GRADES=[{key:'pep3',label:'3年级'},{key:'pep4',label:'4年级'},{key:'pep5',label:'5年级'},{key:'pep6',label:'6年级'}];
let curGrade='pep3',curFamilyId=null;

function init(){renderGradeTabs();renderGrid();}

function renderGradeTabs(){
  document.getElementById('gradeTabs').innerHTML=GRADES.map(g=>
    `<button class="gtab ${g.key===curGrade?'active':''}" onclick="setGrade('${g.key}')">${g.label}</button>`
  ).join('');
}
function setGrade(k){curGrade=k;curFamilyId=null;renderGradeTabs();renderGrid();hideDetail();}
function renderGrid(){
  const list=FAMILIES.filter(f=>f.grade===curGrade);
  const label=GRADES.find(g=>g.key===curGrade).label;
  document.getElementById('secTitle').textContent=`📚 ${label}词族（${list.length}组）`;
  document.getElementById('familyGrid').innerHTML=list.map(f=>
    `<div class="fcard ${f.id===curFamilyId?'active':''}" onclick="openFamily('${f.id}')">
      <span class="fcard-emoji">${f.emoji}</span>
      <div class="fcard-name">${f.family}</div>
      <div class="fcard-count">${f.words.length}个词</div>
    </div>`
  ).join('');
}
function openFamily(id){
  curFamilyId=id;renderGrid();
  const f=FAMILIES.find(x=>x.id===id);
  renderDetail(f);
  setTimeout(()=>document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function hideDetail(){
  const d=document.getElementById('detail');
  d.classList.remove('show');d.innerHTML='';
}
function renderDetail(f){
  const gradeLabel=GRADES.find(g=>g.key===f.grade).label;
  const colorMap={};
  f.words.forEach((w,i)=>colorMap[w.en.toLowerCase()]=COLORS[i]);
  document.getElementById('detail').innerHTML=`
    <div class="detail-header">
      <span class="d-emoji">${f.emoji}</span>
      <div><div class="d-title">${f.family}</div><span class="d-grade">${gradeLabel} · 人教版PEP</span></div>
    </div>
    <div class="sent-box">
      <div class="sent-label">📖 语境例句</div>
      <div class="sent-en">${highlightSentence(f.sentence,f.words,colorMap)}</div>
      <div class="sent-cn">${f.sentence_cn}</div>
      <button class="speak-all" onclick="speakText(${JSON.stringify(f.sentence)})">🔊</button>
    </div>
    ${buildWebSVG(f,colorMap)}
    <div class="word-grid">${f.words.map((w,i)=>`
      <div class="wcard" style="background:${COLORS[i]}" onclick="speakText('${w.en}')">
        <div class="wcard-top">
          <span class="wcard-emoji">${w.emoji}</span>
          <button class="wcard-spk" onclick="event.stopPropagation();speakText('${w.en}')">🔊</button>
        </div>
        <div class="wcard-en">${w.en}</div>
        <div class="wcard-ipa">${w.ipa}</div>
        <div class="wcard-cn">${w.cn}</div>
      </div>`).join('')}
    </div>
    <div class="detail-nav">
      <button class="nav-btn" id="btnPrev" onclick="navFamily(-1)">← 上一族</button>
      <button class="play-btn" onclick="goWordMatch()">🎮 用这族词打消消乐</button>
      <button class="nav-btn" id="btnNext" onclick="navFamily(1)">下一族 →</button>
    </div>`;
  document.getElementById('detail').classList.add('show');
  const list=FAMILIES.filter(x=>x.grade===curGrade);
  const idx=list.findIndex(x=>x.id===f.id);
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===list.length-1;
}
function highlightSentence(sentence,words,colorMap){
  let html=sentence;
  [...words].sort((a,b)=>b.en.length-a.en.length).forEach(w=>{
    const c=colorMap[w.en.toLowerCase()];
    html=html.replace(new RegExp(`\\b(${w.en})\\b`,'gi'),
      `<span class="w-tag" style="background:${c}22;color:${c};border:1.5px solid ${c}55" onclick="speakText('${w.en}')">$1</span>`);
  });
  return html;
}
function buildWebSVG(f,colorMap){
  const W=400,H=320,cx=200,cy=160,r=118;
  const n=f.words.length;
  let lines='',nodes='';
  f.words.forEach((w,i)=>{
    const angle=(i*2*Math.PI/n)-Math.PI/2;
    const x=+(cx+r*Math.cos(angle)).toFixed(1);
    const y=+(cy+r*Math.sin(angle)).toFixed(1);
    const c=COLORS[i];
    lines+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${c}" stroke-width="1.5" stroke-opacity=".35" stroke-dasharray="4 3"/>`;
    nodes+=`<g onclick="speakText('${w.en}')" style="cursor:pointer">
      <circle cx="${x}" cy="${y}" r="27" fill="${c}18" stroke="${c}" stroke-width="1.8"/>
      <text x="${x}" y="${y-4}" text-anchor="middle" font-size="12" font-family="Nunito,sans-serif" font-weight="800" fill="${c}">${w.en}</text>
      <text x="${x}" y="${y+12}" text-anchor="middle" font-size="12">${w.emoji}</text>
    </g>`;
  });
  return `<div class="web-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${lines}
    <circle cx="${cx}" cy="${cy}" r="46" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="13" font-family="Fredoka,cursive" font-weight="700" fill="#8B5CF6">${f.family.replace('家族','')}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="20">${f.emoji}</text>
    ${nodes}
  </svg></div>`;
}
function navFamily(dir){
  const list=FAMILIES.filter(f=>f.grade===curGrade);
  const idx=list.findIndex(f=>f.id===curFamilyId);
  const next=list[idx+dir];
  if(next)openFamily(next.id);
}
function goWordMatch(){
  const f=FAMILIES.find(x=>x.id===curFamilyId);
  if(!f)return;
  try{localStorage.setItem('eduplay_custom_vocab',JSON.stringify({name:f.family,pairs:f.words.map(w=>[w.en,w.cn])}));}catch(e){}
  window.open('/word-match/','_blank');
}
function speakText(text){
  if(!('speechSynthesis' in window))return fallbackAudio(text);
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=text.includes(' ')?0.85:0.9;
  const v=speechSynthesis.getVoices();
  const pick=v.find(x=>x.lang.startsWith('en')&&/samantha|aria|zira|google us/i.test(x.name))||v.find(x=>x.lang.startsWith('en-US'))||v.find(x=>x.lang.startsWith('en'));
  if(pick)u.voice=pick;
  speechSynthesis.speak(u);
}
function fallbackAudio(word){
  if(!word.includes(' '))new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=1`).play().catch(()=>{});
}
if('speechSynthesis' in window)speechSynthesis.onvoiceschanged=()=>{};
init();
</script>
</body>
</html>
